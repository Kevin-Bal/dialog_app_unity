<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Île aux Lettres — éditeur de dialogues</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <!-- Écran d'entrée : il faut rejoindre ou créer une salle avant l'éditeur -->
    <div id="gate">
      <div class="gate-card">
        <div class="gate-brand"><span class="dot"></span><strong>Île aux Lettres</strong></div>
        <p class="gate-sub">Éditeur de dialogues partagé</p>

        <label class="gate-label" for="gate-code">Rejoindre une salle existante</label>
        <div class="gate-row">
          <input id="gate-code" type="text" placeholder="Code de salle" autocomplete="off" spellcheck="false" />
          <button id="gate-join" class="primary">Entrer</button>
        </div>

        <div class="gate-or"><span>ou</span></div>

        <label class="gate-label" for="gate-project">Créer une nouvelle salle</label>
        <input id="gate-project" type="text" placeholder="Nom du projet (optionnel)" autocomplete="off" />
        <button id="gate-create" class="ghost gate-create">Créer la salle</button>
        <p id="gate-error" class="gate-error"></p>
      </div>
    </div>

    <div id="app" class="is-hidden">
      <header id="topbar">
        <div class="brand">
          <span class="dot"></span>
          <strong id="project-name">Île aux Lettres</strong>
          <span id="room-code" class="chip">POSTE-42</span>
        </div>
        <div class="actions">
          <button id="btn-export" class="primary">Exporter .yarn</button>
        </div>
      </header>

      <main>
        <aside id="sidebar"></aside>
        <section id="canvas-wrap">
          <div id="canvas-toolbar">
            <span id="canvas-title">—</span>
            <span class="grow"></span>
            <button id="btn-add-hub" class="ghost">+ Aiguillage</button>
            <button id="btn-add-node" class="ghost">+ Nœud</button>
          </div>
          <div id="canvas">
            <svg id="connectors"></svg>
          </div>
        </section>
        <aside id="inspector"></aside>
      </main>

      <footer id="validation"></footer>
    </div>

    <script type="module" src="src/app.js"></script>
  </body>
</html>
